<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day Forecast - Oʻahu Snorkel Report</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <a href="index.html">Snorkel Report</a>
    <a href="day-forecast.html">Day Forecast</a>
    <a href="week-forecast.html">Week Forecast</a>
    <a href="map.html">Map</a>
  </nav>

  <!-- Main Container -->
  <div class="container">
    <!-- Forecast Header -->
    <div class="forecast-header">
      <h1>Day Forecast</h1>
      <div class="forecast-date" id="forecast-date"></div>
    </div>

    <div class="day-forecast-controls" aria-label="Day forecast navigation">
      <button class="day-nav-button" id="day-prev" type="button" aria-label="Show previous day">Previous</button>
      <div class="day-tabs" id="day-tabs" role="tablist" aria-label="Forecast days"></div>
      <button class="day-nav-button" id="day-next" type="button" aria-label="Show next day">Next</button>
    </div>

    <!-- Scrollable Day Sections -->
    <div class="scroll-wrapper" id="scroll-days"></div>

    <!-- Error Message -->
    <div id="error-message" class="error-message" style="display: none;"></div>
  </div>

  <!-- Footer -->
  <footer>Report generated by Brighton Hedger using Open-Meteo API</footer>

  <!-- Scripts -->
  <script src="js/navigation.js"></script>
  <script src="js/snorkel-shared.js"></script>
  <script src="js/day-forecast.js"></script>
</body>
</html>
