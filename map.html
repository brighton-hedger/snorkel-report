<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map - Oʻahu Snorkel Report</title>
  <link rel="icon" type="image/svg+xml" href="assets/snorkeling_turtle_favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map {
      height: 600px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }
    .map-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .map-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .map-header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      color: #000;
    }
    .map-header p {
      margin-top: 5px;
      font-size: 16px;
      color: #555;
    }
    .region-popup {
      font-family: 'Montserrat', sans-serif;
      width: 100%;
      min-width: 0;
      max-width: none;
      box-sizing: border-box;
    }
    .leaflet-popup-content {
      width: auto !important;
      max-width: none;
      margin: 14px 16px 16px;
      max-height: min(70vh, 560px);
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 6px;
      box-sizing: border-box;
    }
    .leaflet-popup-content-wrapper {
      width: min(92vw, 418px);
      max-width: 418px;
      overflow: hidden;
    }
    .leaflet-popup-content::-webkit-scrollbar {
      width: 10px;
    }
    .leaflet-popup-content::-webkit-scrollbar-track {
      background: rgba(42, 161, 152, 0.12);
      border-radius: 999px;
    }
    .leaflet-popup-content::-webkit-scrollbar-thumb {
      background: rgba(42, 161, 152, 0.5);
      border-radius: 999px;
    }
    .map-popup-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .region-popup h3 {
      margin: 0;
      color: #2aa198;
      font-size: 18px;
    }
    .region-popup .towns {
      font-size: 12px;
      color: #62706e;
      margin-top: 4px;
    }
    .region-popup .score {
      min-width: 86px;
      text-align: center;
      border: 2px solid currentColor;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 18px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.92);
    }
    .map-popup-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .map-best-window-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      background: #f3fbfa;
      border: 1px solid rgba(42, 161, 152, 0.1);
      min-height: 44px;
      margin-bottom: 10px;
    }
    .map-best-window-head {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .map-best-window-head strong {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #688381;
      line-height: 1;
    }
    .map-best-window-banner span {
      font-size: 13px;
      color: #204e4a;
      white-space: nowrap;
    }
    .map-best-window-banner em {
      font-style: normal;
      font-weight: 700;
    }
    .map-condition-chip {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 10px;
      border-radius: 12px;
      background: #f3fbfa;
      border: 1px solid rgba(42, 161, 152, 0.1);
    }
    .map-condition-head {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .map-tide-summary {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 10px;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
      border-radius: 12px;
      background: #f3fbfa;
      border: 1px solid rgba(42, 161, 152, 0.1);
      margin-bottom: 10px;
    }
    .map-tide-summary-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      width: 100%;
      min-width: 0;
    }
    .map-tide-summary-label {
      display: inline-flex;
      flex: 1 1 auto;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .map-tide-summary-head strong {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #688381;
      line-height: 1;
    }
    .map-tide-summary-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .map-tide-trend {
      display: inline-flex;
      flex: 0 0 auto;
      white-space: nowrap;
      max-width: 100%;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(79, 149, 214, 0.14);
      color: #2f5f92;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .map-tide-summary-text {
      font-size: 13px;
      color: #204e4a;
      line-height: 1.35;
    }
    .map-chip-icon {
      width: 18px;
      height: 18px;
      object-fit: contain;
      display: inline-block;
    }
    .map-chip-icon-inline {
      width: 16px;
      height: 16px;
      margin-right: 6px;
    }
    .map-condition-head strong {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #688381;
      line-height: 1;
    }
    .map-condition-chip span {
      font-size: 13px;
      color: #204e4a;
      line-height: 1.25;
    }
    .map-popup-unavailable {
      font-size: 13px;
      color: #54708e;
    }
    .legend {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      line-height: 1.8;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-color {
      width: 20px;
      height: 20px;
      border-radius: 4px;
    }
    @media (max-width: 768px) {
      #map {
        height: 450px;
      }
      .region-popup {
        width: 100%;
      }
      .leaflet-popup-content {
        margin: 12px 14px 14px;
      }
      .map-popup-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .map-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <a href="index.html">Snorkel Report</a>
    <a href="day-forecast.html">Day Forecast</a>
    <a href="week-forecast.html">Week Forecast</a>
    <a href="map.html">Map</a>
  </nav>

  <!-- Main Container -->
  <div class="container map-container">
    <!-- Map Header -->
    <div class="map-header">
      <h1>Oʻahu Snorkel Regions</h1>
      <p>Interactive map showing all snorkel regions with current conditions</p>
    </div>

    <!-- Map -->
    <div id="map"></div>
  </div>

  <!-- Footer -->
  <footer>Report generated by Brighton Hedger using Open-Meteo API</footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/snorkel-shared.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
