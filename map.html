<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map - Oʻahu Snorkel Report</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map {
      height: 600px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }
    .map-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .map-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .map-header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      color: #000;
    }
    .map-header p {
      margin-top: 5px;
      font-size: 16px;
      color: #555;
    }
    .region-popup {
      font-family: 'Montserrat', sans-serif;
    }
    .region-popup h3 {
      margin: 0 0 8px 0;
      color: #2aa198;
      font-size: 18px;
    }
    .region-popup .towns {
      font-size: 14px;
      color: #555;
      margin-bottom: 8px;
    }
    .region-popup .score {
      font-size: 24px;
      font-weight: bold;
    }
    .region-popup .conditions {
      font-size: 13px;
      margin-top: 8px;
      color: #333;
    }
    .legend {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      line-height: 1.8;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-color {
      width: 20px;
      height: 20px;
      border-radius: 4px;
    }
    @media (max-width: 768px) {
      #map {
        height: 450px;
      }
      .map-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <a href="index.html">Snorkel Report</a>
    <a href="day-forecast.html">Day Forecast</a>
    <a href="week-forecast.html">Week Forecast</a>
    <a href="map.html">Map</a>
  </nav>

  <!-- Main Container -->
  <div class="container map-container">
    <!-- Map Header -->
    <div class="map-header">
      <h1>Oʻahu Snorkel Regions</h1>
      <p>Interactive map showing all snorkel regions with current conditions</p>
    </div>

    <!-- Map -->
    <div id="map"></div>
  </div>

  <!-- Footer -->
  <footer>Report generated by Brighton Hedger using Open-Meteo API</footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/snorkel-shared.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
