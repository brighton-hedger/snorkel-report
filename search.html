<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Oahu Snorkel Forecasts | Region and Date Lookup</title>
  <meta
    name="description"
    content="Search Oahu snorkel forecasts by region and date to view a daylight score graph within the current forecast window."
  />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://snorkelreports.com/search" />
  <meta property="og:title" content="Search Oahu Snorkel Forecasts" />
  <meta
    property="og:description"
    content="Select an Oahu snorkel region and date to view the forecast day graph and current forecast availability."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://snorkelreports.com/search" />
  <link rel="icon" type="image/svg+xml" href="assets/snorkeling_turtle_favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav>
    <a href="index.html">Snorkel Report</a>
  </nav>

  <div class="container">
    <div class="content-hero">
      <h1>Search Forecasts</h1>
      <p>Pick a region and date to pull up that day's daylight snorkel score graph.</p>
    </div>

    <section class="content-card search-card">
      <div class="search-controls">
        <div class="search-field">
          <label for="search-region">Region</label>
          <select id="search-region"></select>
        </div>
        <div class="search-field">
          <label for="search-date">Date</label>
          <input id="search-date" type="date" />
        </div>
        <button id="search-submit" class="search-button" type="button">Show Graph</button>
      </div>
    </section>

    <section id="search-results" class="content-card search-card" style="display:none;"></section>
  </div>

  <footer>Report generated by Brighton Hedger using Open-Meteo API</footer>

  <script src="js/navigation.js"></script>
  <script src="js/snorkel-shared.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
